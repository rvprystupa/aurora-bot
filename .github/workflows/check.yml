yamlname: Aurora Vacancy Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore seen vacancies
        uses: actions/cache@v3
        with:
          path: seen_vacancies.json
          key: seen-vacancies-${{ github.run_id }}
          restore-keys: |
            seen-vacancies-

      - name: Run check
        run: python bot.py

      - name: Save seen vacancies
        uses: actions/cache/save@v3
        if: always()
        with:
          path: seen_vacancies.json
          key: seen-vacancies-${{ github.run_id }}
